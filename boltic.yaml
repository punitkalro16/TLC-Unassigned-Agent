app: tlc-unassigned-agent-account
build:
    builtin: dockerfile
    ignorefile: .gitignore
language: nodejs/22
region: asia-south1
serverlessConfig:
    PortMap:
        - Protocol: http
          Port: 8080
          Name: http
    Scaling:
        AutoStop: false
        Min: 1
        Max: 10
        MaxIdleTime: 300
    Resources:
        CPU: 1
        MemoryMB: 2048
        MemoryMaxMB: 2048
